version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: audit-db
    environment:
      POSTGRES_USER: audit
      POSTGRES_PASSWORD: audit_password
      POSTGRES_DB: audit_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audit"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: audit-backend
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql://audit:audit_password@postgres:5432/audit_db
      UPLOAD_FOLDER: /app/uploads
      MAX_FILE_SIZE: 52428800
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - audit-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: audit-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    networks:
      - audit-network

volumes:
  postgres_data:
  backend_uploads:

networks:
  audit-network:
    driver: bridge
